<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totem Laboratório Anchieta</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --verde-escuro: #007154;
      --verde-vivo: #00a859;
      --verde-menta: #53c486;
      --vermelho: #ef1c24;
      --branco: #ffffff;
      --cinza: #f4f8f6;
      --texto: #23313a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.78), rgba(255,255,255,.9)),
        url("https://www.laboratorioanchieta.com.br/wt_admin/uploads/banner-unilabor.jpg");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: var(--texto);
    }

    .topo {
      width: 100%;
      background: linear-gradient(90deg, var(--verde-escuro), var(--verde-vivo));
      color: white;
      padding: 14px 22px;
      text-align: center;
      font-weight: 800;
      letter-spacing: .5px;
      font-size: 18px;
    }

    .container {
      max-width: 760px;
      margin: 28px auto;
      padding: 18px;
    }

    .card {
      background: rgba(255,255,255,.96);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
      padding: 28px;
      text-align: center;
      border: 1px solid rgba(0,113,84,.16);
    }

    .logo-box {
      width: 140px;
      height: 140px;
      margin: 0 auto 14px;
      background: white;
      border-radius: 18px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(0,113,84,.18);
      overflow: hidden;
    }

    .logo-box img {
      width: 118px;
      max-height: 118px;
      object-fit: contain;
    }

    h1 {
      margin: 8px 0 6px;
      color: var(--verde-escuro);
      font-size: 30px;
    }

    p {
      font-size: 17px;
      line-height: 1.45;
      color: #4d5b63;
    }

    .qr-area {
      margin: 24px auto;
      border: 3px dashed var(--verde-vivo);
      border-radius: 22px;
      padding: 18px;
      max-width: 430px;
      background: #f9fffc;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 22px;
      margin: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      color: white;
      background: var(--verde-escuro);
      box-shadow: 0 8px 18px rgba(0,113,84,.22);
    }

    button.sec {
      background: var(--verde-vivo);
    }

    button.red {
      background: var(--vermelho);
    }

    button.dark {
      background: #1d2d38;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid #d9e5e0;
      font-size: 16px;
      margin-top: 12px;
    }

    .resultado {
      display: none;
      margin-top: 20px;
      text-align: left;
      background: #f4f8f6;
      border-radius: 18px;
      padding: 18px;
      border-left: 6px solid var(--verde-vivo);
    }

    .link-lido {
      word-break: break-all;
      background: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      color: #26343d;
      border: 1px solid #d8e5df;
    }

    .aviso {
      font-size: 14px;
      color: #5c6870;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="topo">RESULTADOS ONLINE · LABORATÓRIO ANCHIETA</div>

  <div class="container">
    <div class="card">
      <div class="logo-box">
        <img src="https://www.laboratorioanchieta.com.br/wt_admin/uploads/logo.png" alt="Laboratório Anchieta" onerror="this.style.display='none'">
      </div>

      <h1>Totem de Resultados</h1>
      <p>Aproxime o <b>QR Code quadrado</b> do protocolo na câmera para acessar seus exames.</p>

      <div class="qr-area">
        <div id="reader"></div>
      </div>

      <button onclick="iniciarLeitura()">Iniciar leitura</button>
      <button class="red" onclick="pararLeitura()">Parar</button>

      <p class="aviso">
        Atenção: a leitura deve ser feita no QR Code quadrado, não no código de barras.
      </p>

      <input id="manual" placeholder="Ou cole aqui o link lido do QR para testar" />
      <button class="sec" onclick="usarManual()">Testar link manual</button>

      <div id="resultado" class="resultado">
        <h3>Link identificado:</h3>
        <div id="linkLido" class="link-lido"></div>

        <div style="text-align:center; margin-top: 16px;">
          <button onclick="abrirExato()">Abrir link exato do QR</button>
          <button class="sec" onclick="abrir8443()">Testar acesso :8443</button>
          <button class="dark" onclick="abrirSSO()">Testar SSO</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let ultimoLink = "";

    function mostrarLink(link) {
      ultimoLink = link.trim();
      document.getElementById("resultado").style.display = "block";
      document.getElementById("linkLido").innerText = ultimoLink;
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function pareceQRCodeValido(texto) {
      if (!texto) return false;

      const t = texto.trim();

      if (t.length < 20) return false;

      const contemUnilabor =
        t.includes("unilabor") ||
        t.includes("ConcentWeb") ||
        t.includes("hlab");

      const pareceCodigoBarra =
        /^[0-9]{6,}$/.test(t) ||
        /^[0-9.\- ]{6,}$/.test(t);

      return contemUnilabor && !pareceCodigoBarra;
    }

    async function iniciarLeitura() {
      try {
        document.getElementById("resultado").style.display = "none";

        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 260, height: 260 },
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
          },
          async (decodedText) => {
            if (!pareceQRCodeValido(decodedText)) {
              alert("Isso parece código de barras ou código inválido. Aponte para o QR Code quadrado.");
              return;
            }

            await pararLeitura();
            mostrarLink(decodedText);
          },
          () => {}
        );
      } catch (e) {
        alert("Não foi possível abrir a câmera. Verifique a permissão do navegador.");
        console.error(e);
      }
    }

    async function pararLeitura() {
      try {
        if (html5QrCode) {
          await html5QrCode.stop();
          await html5QrCode.clear();
          html5QrCode = null;
        }
      } catch (e) {
        console.log(e);
      }
    }

    function usarManual() {
      const valor = document.getElementById("manual").value;
      if (!valor.trim()) {
        alert("Cole o link primeiro.");
        return;
      }
      mostrarLink(valor);
    }

    function abrirExato() {
      if (!ultimoLink) return;
      window.location.href = ultimoLink;
    }

    function abrir8443() {
      if (!ultimoLink) return;

      let link = ultimoLink;

      link = link.replace("http://", "https://");
      link = link.replace("acesso.unilabor.com.br:8080", "acesso.unilabor.com.br:8443");
      link = link.replace("acesso.unilabor.com.br/", "acesso.unilabor.com.br:8443/");

      window.location.href = link;
    }

    function abrirSSO() {
      if (!ultimoLink) return;

      let link = ultimoLink;

      link = link.replace("http://", "https://");
      link = link.replace("https://acesso.unilabor.com.br:8080", "https://sso.unilabor.com.br");
      link = link.replace("https://acesso.unilabor.com.br:8443", "https://sso.unilabor.com.br");
      link = link.replace("https://acesso.unilabor.com.br", "https://sso.unilabor.com.br");

      window.location.href = link;
    }
  </script>
</body>
</html>
