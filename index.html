<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Totem Laboratório Anchieta</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root{
      --verde-escuro:#006a50;--verde:#00a859;--menta:#53c486;--vermelho:#ef1c24;--branco:#fff;--texto:#173a35;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4faf7;color:var(--texto);min-height:100vh;overflow:hidden}
    .bg{position:fixed;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.96),rgba(255,255,255,.75)),url('https://www.laboratorioanchieta.com.br/wt_admin/uploads/banner-unilabor.jpg') center/cover no-repeat;filter:saturate(1.05);}
    .top{position:relative;z-index:2;height:82px;background:linear-gradient(90deg,var(--verde-escuro),var(--verde));display:flex;align-items:center;justify-content:space-between;padding:0 34px;color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.16)}
    .brand{display:flex;align-items:center;gap:16px}.logoBox{width:62px;height:62px;background:#fff;border-radius:14px;display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.12);overflow:hidden}.logoBox img{width:58px;height:58px;object-fit:contain}.brand h1{font-size:22px;margin:0;line-height:1.05}.brand p{margin:2px 0 0;font-size:13px;opacity:.9}.status{font-weight:700;background:rgba(255,255,255,.16);padding:12px 16px;border-radius:999px}
    .wrap{position:relative;z-index:2;min-height:calc(100vh - 82px);display:grid;place-items:center;padding:28px}.card{width:min(920px,94vw);background:rgba(255,255,255,.93);border:1px solid rgba(0,106,80,.16);border-radius:34px;box-shadow:0 26px 70px rgba(0,82,61,.18);padding:36px;text-align:center;backdrop-filter:blur(8px)}
    h2{font-size:clamp(28px,4vw,48px);margin:0 0 12px;color:var(--verde-escuro)}.lead{font-size:clamp(17px,2vw,23px);margin:0 auto 28px;max-width:720px;color:#45635f;line-height:1.35}.scanPanel{display:grid;grid-template-columns:1fr;gap:18px;align-items:center}.videoBox{position:relative;margin:0 auto;width:min(520px,86vw);aspect-ratio:1/1;border-radius:30px;background:#0a1f1c;overflow:hidden;border:8px solid #fff;box-shadow:0 20px 45px rgba(0,0,0,.22)}video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.frame{position:absolute;inset:38px;border:5px solid var(--verde);border-radius:24px;box-shadow:0 0 0 999px rgba(0,0,0,.28)}.line{position:absolute;left:48px;right:48px;top:52px;height:4px;background:var(--vermelho);border-radius:6px;animation:scan 1.6s infinite ease-in-out;box-shadow:0 0 18px var(--vermelho)}@keyframes scan{0%,100%{transform:translateY(0)}50%{transform:translateY(340px)}}
    .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:20px}.btn{border:0;border-radius:18px;padding:17px 24px;font-weight:800;font-size:17px;cursor:pointer;box-shadow:0 12px 26px rgba(0,0,0,.12)}.primary{background:var(--verde);color:#fff}.secondary{background:#fff;color:var(--verde-escuro);border:2px solid rgba(0,106,80,.18)}.danger{background:var(--vermelho);color:#fff}.manual{margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.manual input{width:min(560px,80vw);border:2px solid rgba(0,106,80,.22);border-radius:14px;padding:15px;font-size:16px}.msg{margin-top:18px;min-height:30px;font-size:18px;font-weight:700;color:#345}.ok{color:var(--verde-escuro)}.warn{color:#a35b00}.err{color:#b00020}.hidden{display:none}.footer{position:fixed;z-index:2;bottom:16px;left:0;right:0;text-align:center;color:#58736f;font-size:14px}.badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
  </style>
</head>
<body>
  <div class="bg"></div>
  <header class="top"><div class="brand"><div class="logoBox"><img alt="Laboratório Anchieta" src="https://www.laboratorioanchieta.com.br/wp-content/uploads/2022/07/cropped-Laboratorio-Anchieta-32x32.jpg" onerror="this.style.display='none'"></div><div><h1>Laboratório Anchieta</h1><p>Totem de resultados online</p></div></div><div class="status" id="clock">Aguardando</div></header>
  <main class="wrap"><section class="card" id="home"><h2>Aproxime o QR Code do protocolo</h2><p class="lead">Use o QR Code quadrado impresso no protocolo. O código de barras será ignorado.</p><div class="videoBox hidden" id="videoBox"><video id="video" playsinline muted></video><canvas id="canvas" class="hidden"></canvas><div class="frame"></div><div class="line"></div></div><div class="btns"><button class="btn primary" id="startBtn">Iniciar leitura</button><button class="btn secondary hidden" id="stopBtn">Cancelar leitura</button></div><div class="manual"><input id="manualUrl" placeholder="Teste manual: cole aqui o link completo do QR Code"><button class="btn secondary" id="manualBtn">Abrir link</button></div><div class="msg" id="msg">Sistema pronto.</div></section></main>
  <div class="footer"><span class="badge">🔒 Após abrir o portal, digite a data de nascimento na tela da Unilabor.</span></div>
<script>
const video=document.getElementById('video'), canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const startBtn=document.getElementById('startBtn'), stopBtn=document.getElementById('stopBtn'), videoBox=document.getElementById('videoBox'), msg=document.getElementById('msg'), manualUrl=document.getElementById('manualUrl'), manualBtn=document.getElementById('manualBtn');
let stream=null, scanning=false, lastValue='';
function setMsg(t,c=''){msg.className='msg '+c;msg.textContent=t}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} setInterval(tick,1000); tick();
function normalizeUrl(raw){
  let v=(raw||'').trim();
  if(!v) return '';
  // Caso o leitor traga espaços/quebras
  v=v.replace(/\s+/g,'');
  // Se veio sem protocolo
  if(/^acesso\.unilabor\.com\.br/i.test(v) || /^sso\.unilabor\.com\.br/i.test(v)) v='https://'+v;
  // O QR real pode vir em acesso.unilabor.com.br:8080, que em algumas redes dá timeout.
  // Normaliza para o domínio que abriu no celular: sso.unilabor.com.br
  v=v.replace(/^http:\/\/acesso\.unilabor\.com\.br:8080/i,'https://sso.unilabor.com.br');
  v=v.replace(/^https:\/\/acesso\.unilabor\.com\.br:8080/i,'https://sso.unilabor.com.br');
  return v;
}
function isValidQrUrl(v){
  try{const u=new URL(v); return /(^|\.)unilabor\.com\.br$/i.test(u.hostname) && /ConcentWeb/i.test(u.pathname);}catch(e){return false;}
}
function isBarcodeLike(v){return /^[0-9.\-]{6,}$/.test((v||'').trim());}
function handleCode(raw){
  const normalized=normalizeUrl(raw);
  if(isBarcodeLike(raw) || !/^https?:\/\//i.test(normalized)) { setMsg('Isso parece código de barras, não QR Code. Aponte para o QR quadrado.', 'warn'); return; }
  if(!isValidQrUrl(normalized)){ setMsg('QR lido, mas não parece link válido da Unilabor. Tente aproximar novamente.', 'err'); return; }
  stopCamera(); setMsg('QR Code lido. Abrindo portal...', 'ok');
  setTimeout(()=>{ window.location.href=normalized; }, 700);
}
async function startCamera(){
  try{
    setMsg('Abrindo câmera...');
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}}, audio:false});
    video.srcObject=stream; await video.play();
    scanning=true; videoBox.classList.remove('hidden'); stopBtn.classList.remove('hidden'); startBtn.classList.add('hidden'); setMsg('Aponte somente para o QR Code quadrado.', 'ok'); requestAnimationFrame(scan);
  }catch(e){ setMsg('Não consegui abrir a câmera. Abra por HTTPS e permita o acesso à câmera.', 'err'); }
}
function stopCamera(){scanning=false; if(stream){stream.getTracks().forEach(t=>t.stop()); stream=null;} videoBox.classList.add('hidden'); stopBtn.classList.add('hidden'); startBtn.classList.remove('hidden');}
function scan(){
  if(!scanning) return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth; canvas.height=video.videoHeight; ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
    if(code && code.data && code.data!==lastValue){ lastValue=code.data; handleCode(code.data); return; }
  }
  requestAnimationFrame(scan);
}
startBtn.addEventListener('click', startCamera); stopBtn.addEventListener('click', ()=>{stopCamera(); setMsg('Leitura cancelada.','warn')});
manualBtn.addEventListener('click', ()=>handleCode(manualUrl.value));
</script>
</body>
</html>
