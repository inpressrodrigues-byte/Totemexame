<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Totem Anchieta</title>

  <style>
    :root {
      --verde-escuro:#006b50;
      --verde:#00a859;
      --verde-claro:#62c98f;
      --vermelho:#ed1c24;
      --texto:#1f3430;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--texto);
      background:
        linear-gradient(180deg, rgba(255,255,255,.84), rgba(244,251,247,.96)),
        url("https://www.laboratorioanchieta.com.br/wt_admin/uploads/banner-unilabor.jpg");
      background-size:cover;
      background-position:center;
    }
    .barra {
      background:linear-gradient(90deg,var(--verde-escuro),var(--verde));
      color:white;
      text-align:center;
      padding:14px 10px;
      font-weight:800;
      font-size:16px;
    }
    .wrap { width:min(92vw,760px); margin:22px auto; }
    .card {
      background:rgba(255,255,255,.97);
      border:1px solid rgba(0,107,80,.16);
      border-radius:28px;
      padding:24px;
      box-shadow:0 18px 44px rgba(0,0,0,.16);
      text-align:center;
    }
    .logo {
      width:150px;
      min-height:112px;
      margin:0 auto 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
      border-radius:18px;
      border:1px solid rgba(0,107,80,.18);
      overflow:hidden;
      padding:8px;
    }
    .logo img { max-width:100%; max-height:100px; object-fit:contain; display:block; }
    .logo-text { color:var(--verde-escuro); font-weight:900; font-size:18px; line-height:1.1; }
    h1 { margin:8px 0 6px; color:var(--verde-escuro); font-size:30px; }
    p { margin:8px 0; color:#50645f; font-size:17px; line-height:1.45; }
    .scanner {
      margin:20px auto 14px;
      max-width:430px;
      min-height:320px;
      border-radius:24px;
      border:3px dashed var(--verde);
      background:#f9fffc;
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    #reader {
      width:100%;
      min-height:280px;
      border-radius:18px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #reader video {
      width:100% !important;
      border-radius:18px;
    }
    .placeholder {
      width:240px;
      height:240px;
      border:5px solid var(--verde);
      border-radius:22px;
      position:relative;
      background:linear-gradient(135deg,#ffffff,#eefbf4);
    }
    .placeholder:after {
      content:"";
      position:absolute;
      left:18px;
      right:18px;
      top:50%;
      height:4px;
      background:var(--vermelho);
      box-shadow:0 0 18px rgba(237,28,36,.45);
    }
    button {
      appearance:none;
      border:none;
      border-radius:15px;
      padding:15px 18px;
      margin:7px 4px;
      color:white;
      background:var(--verde-escuro);
      font-weight:800;
      font-size:16px;
      box-shadow:0 10px 22px rgba(0,107,80,.22);
    }
    button.verde { background:var(--verde); }
    button.vermelho { background:var(--vermelho); }
    button.escuro { background:#213530; }
    input {
      width:100%;
      border:2px solid #d8e8e2;
      border-radius:16px;
      padding:15px;
      font-size:16px;
      margin-top:14px;
      outline:none;
    }
    .box {
      display:none;
      text-align:left;
      margin-top:18px;
      padding:16px;
      border-radius:18px;
      background:#f4fbf7;
      border-left:6px solid var(--verde);
    }
    .link {
      background:white;
      border:1px solid #d8e8e2;
      border-radius:12px;
      padding:12px;
      word-break:break-all;
      font-size:14px;
      color:#1d312d;
      white-space:pre-wrap;
    }
    .status {
      min-height:24px;
      margin-top:10px;
      color:#5c6f69;
      font-size:14px;
      font-weight:700;
      white-space:pre-wrap;
    }
    .erro { color:var(--vermelho); }
    .ok { color:var(--verde-escuro); }
    .aviso {
      background:#fff8e9;
      color:#675329;
      border:1px solid #f2dfad;
      border-radius:14px;
      padding:10px;
      margin:12px 0;
      font-size:14px;
      text-align:left;
    }
  </style>
</head>

        <div id="reader">
          <div class="placeholder"></div>
        </div>
      </div>

      <button onclick="iniciarLeitura()">Iniciar câmera</button>
      <button class="vermelho" onclick="pararLeitura()">Parar</button>

      <div id="status" class="status">Pronto para iniciar.</div>

      <input id="manual" type="text" placeholder="Teste manual: cole aqui o link do QR">
      <button class="verde" onclick="usarManual()">Testar link manual</button>

      <div id="resultado" class="box">
        <h3>Link identificado:</h3>
        <div id="linkLido" class="link"></div>

        <div style="text-align:center; margin-top:14px;">
          <button onclick="abrirExato()">Abrir link exato</button>
          <button class="verde" onclick="abrir8443()">Testar :8443</button>
          <button class="escuro" onclick="abrirSSO()">Testar SSO</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    var html5QrCode = null;
    var ultimoLink = "";

    window.onerror = function(msg) {
      setStatus("Erro no site: " + msg, "erro");
      return false;
    };

    function setStatus(texto, tipo) {
      var st = document.getElementById("status");
      if (!st) return;
      st.textContent = texto;
      st.className = "status " + (tipo || "");
    }

    function mostrarLink(link) {
      ultimoLink = String(link || "").trim();
      document.getElementById("resultado").style.display = "block";
      document.getElementById("linkLido").textContent = ultimoLink;
      setStatus("QR lido. Agora escolha uma opção para abrir.", "ok");
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function codigoValido(texto) {
      var t = String(texto || "").trim();
      if (!t) return false;

      var soNumero = /^[0-9.\-\s]{6,}$/.test(t);
      var temUnilabor =
        t.indexOf("unilabor") >= 0 ||
        t.indexOf("ConcentWeb") >= 0 ||
        t.indexOf("hlab") >= 0 ||
        t.indexOf("webwlab") >= 0;

      return temUnilabor && !soNumero;
    }

    function carregarScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function carregarBibliotecaQR() {
      if (window.Html5Qrcode) return;

      try {
        setStatus("Carregando leitor QR...", "");
        await carregarScript("https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js");
      } catch(e1) {
        try {
          await carregarScript("https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js");
        } catch(e2) {
          throw new Error("Não carregou a biblioteca de QR. Verifique internet/rede.");
        }
      }

      if (!window.Html5Qrcode) {
        throw new Error("Biblioteca QR não iniciou.");
      }
    }

    async function escolherCameraTraseira() {
      try {
        var devices = await Html5Qrcode.getCameras();
        if (!devices || !devices.length) return { facingMode: "environment" };

        var back = devices.find(function(d) {
          var label = (d.label || "").toLowerCase();
          return label.includes("back") || label.includes("traseira") || label.includes("environment");
        });

        return back ? { deviceId: { exact: back.id } } : { deviceId: { exact: devices[devices.length - 1].id } };
      } catch(e) {
        return { facingMode: "environment" };
      }
    }

    async function iniciarLeitura() {
      try {
        setStatus("Preparando câmera...", "");

        if (!location.protocol.startsWith("https") && location.hostname !== "localhost") {
          setStatus("A câmera só funciona em HTTPS. Abra pelo link do GitHub Pages.", "erro");
          return;
        }

        await carregarBibliotecaQR();

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("O navegador não liberou câmera. Abra no Safari/Chrome fora do app.", "erro");
          return;
        }

        document.getElementById("resultado").style.display = "none";
        document.getElementById("reader").innerHTML = "";

        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch(e) {}
          try { await html5QrCode.clear(); } catch(e) {}
        }

        html5QrCode = new Html5Qrcode("reader");
        var cameraConfig = await escolherCameraTraseira();

        setStatus("Pedindo permissão da câmera...", "");

        await html5QrCode.start(
          cameraConfig,
          {
            fps: 12,
            qrbox: function(viewfinderWidth, viewfinderHeight) {
              var minEdge = Math.min(viewfinderWidth, viewfinderHeight);
              var boxSize = Math.floor(minEdge * 0.78);
              return { width: boxSize, height: boxSize };
            },
            aspectRatio: 1.0
          },
          async function(decodedText) {
            var texto = String(decodedText || "").trim();

            if (!codigoValido(texto)) {
              setStatus("Código ignorado. Aponte somente para o QR quadrado, não para o código de barras.", "erro");
              document.getElementById("resultado").style.display = "block";
              document.getElementById("linkLido").textContent = "Ignorado:\n" + texto;
              return;
            }

            await pararLeitura(false);
            mostrarLink(texto);
          },
          function() {}
        );

        setStatus("Câmera ativa. Aponte para o QR Code quadrado.", "ok");
      } catch(e) {
        setStatus("Erro ao abrir câmera/leitor:\n" + (e && e.message ? e.message : e), "erro");
        document.getElementById("reader").innerHTML = "<div class='placeholder'></div>";
      }
    }

    async function pararLeitura(mostrar) {
      try {
        if (html5QrCode) {
          await html5QrCode.stop();
          await html5QrCode.clear();
          html5QrCode = null;
        }
      } catch(e) {}

      if (mostrar !== false) {
        setStatus("Leitura parada.", "");
        document.getElementById("reader").innerHTML = "<div class='placeholder'></div>";
      }
    }

    function usarManual() {
      var valor = document.getElementById("manual").value;
      if (!valor.trim()) {
        setStatus("Cole o link primeiro.", "erro");
        return;
      }
      mostrarLink(valor);
    }

    function abrirExato() {
      if (!ultimoLink) return;
      window.location.href = ultimoLink;
    }

    function abrir8443() {
      if (!ultimoLink) return;

      var link = ultimoLink.trim();
      link = link.replace("http://", "https://");
      link = link.replace("acesso.unilabor.com.br:8080", "acesso.unilabor.com.br:8443");
      link = link.replace("acesso.unilabor.com.br/", "acesso.unilabor.com.br:8443/");

      window.location.href = link;
    }

    function abrirSSO() {
      if (!ultimoLink) return;

      var link = ultimoLink.trim();
      link = link.replace("http://", "https://");
      link = link.replace("https://acesso.unilabor.com.br:8080", "https://sso.unilabor.com.br");
      link = link.replace("https://acesso.unilabor.com.br:8443", "https://sso.unilabor.com.br");
      link = link.replace("https://acesso.unilabor.com.br", "https://sso.unilabor.com.br");

      window.location.href = link;
    }
  </script>
</body>
</html>
